# Local dev only — opt-in, NOT auto-merged (deliberately not named
# docker-compose.override.yml so a bare `docker compose up` on a server can
# never start dev mode). Run local dev with:
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# The base docker-compose.yml is the production stack (Coolify): standalone
# `next build` image, network-internal `expose`. This file instead runs
# `next dev` with the source bind-mounted, so edits hot-reload in the browser.
services:
  osrm:
    ports:
      - "5000:5000"

  app:
    image: beton-app-dev
    build:
      context: .
      target: dev
    command: sh -c "npm install --no-audit --no-fund && exec npm run dev -- -H 0.0.0.0"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      # inotify does not always propagate through the macOS bind mount — poll instead
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      # keep Linux-native node_modules out of the host tree
      - node_modules_dev:/app/node_modules
    ports:
      # host 3001 → container 3000 (host :3000 is taken by the luxwash stack)
      - "3001:3000"

volumes:
  node_modules_dev:
