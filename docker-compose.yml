# Full stack for Coolify (Docker Compose build pack): Next.js app + self-hosted OSRM.
#
# OSRM prepares itself on first boot — no manual steps:
#   1) osrm-data  downloads the Moldova OSM extract into a persistent volume (once)
#   2) osrm        builds the routing graph (extract/partition/customize) on first
#                  run, then serves osrm-routed; subsequent restarts skip the build
#   3) app         the Next.js site, reaches OSRM by service name
#
# The graph build runs once and can take ~1–2 min; the app starts meanwhile and
# routing/pricing begins working as soon as OSRM is ready.

services:
  # 1) Download the Moldova OSM extract into the shared volume (only if missing).
  osrm-data:
    image: alpine:3.20
    volumes:
      - osrm_data:/data
    # Atomic download: write to a temp name and rename only on success, so a
    # partial download can never pass the `test -f` check on the next boot.
    command: >
      sh -c "test -f /data/moldova-latest.osm.pbf ||
      (wget -O /data/.download.osm.pbf
      https://download.geofabrik.de/europe/moldova-latest.osm.pbf &&
      mv /data/.download.osm.pbf /data/moldova-latest.osm.pbf)"
    restart: "no"

  # 2) Build the routing graph once, then serve it.
  # Pinned by digest (osrm-routed v26.7.2): a newer osrm-backend may not load a
  # graph built by an older one, so :latest could crash-loop on redeploy. When
  # bumping the image, also bump the ready-marker suffix below so the graph is
  # deliberately rebuilt instead of crashing.
  osrm:
    image: ghcr.io/project-osrm/osrm-backend@sha256:f31f80901025621677f2281e0f09d8cca95c6ebe6c834d19e4f2a427022d6d56
    depends_on:
      osrm-data:
        condition: service_completed_successfully
    volumes:
      - osrm_data:/data
    command: >
      sh -c "set -e; cd /data;
      if [ ! -f .ready-f31f8090 ]; then
        osrm-extract -p /opt/car.lua moldova-latest.osm.pbf &&
        osrm-partition moldova-latest.osrm &&
        osrm-customize moldova-latest.osrm &&
        touch .ready-f31f8090;
      fi;
      exec osrm-routed --algorithm mld moldova-latest.osrm"
    expose:
      - "5000"
    restart: unless-stopped

  # 3) The website. Coolify routes your domain to this service (port 3000).
  app:
    build:
      context: .
      args:
        # Set NEXT_PUBLIC_SITE_URL in Coolify's environment (as a build variable) to
        # the real production domain — it is baked into the build (canonicals,
        # hreflang, sitemap, JSON-LD) and cannot be changed at runtime.
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://beton.build-time.net}
    depends_on:
      - osrm
    environment:
      # Server-side, used by /api/plan at runtime to reach OSRM on the compose network.
      OSRM_URL: http://osrm:5000
    # Coolify routes your domain to this port via its proxy (set it in "Domains for app").
    expose:
      - "3000"
    restart: unless-stopped

volumes:
  # Persists the downloaded + preprocessed routing data across deploys.
  osrm_data:
